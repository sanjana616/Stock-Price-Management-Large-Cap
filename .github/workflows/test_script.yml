name: Test Run Script

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "*/5 3-10 * * 1-5"

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run script
        run: echo "Hello World"
